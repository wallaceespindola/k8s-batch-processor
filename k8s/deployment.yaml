apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-batch-processor
  namespace: default
  labels:
    app: k8s-batch-processor
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-batch-processor
  template:
    metadata:
      labels:
        app: k8s-batch-processor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: k8s-batch-processor
          image: wallaceespindola/k8s-batch-processor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: k8s-batch-processor-config
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12   # allows up to 20 + 12*10 = 140s for startup
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 15
            failureThreshold: 3
      terminationGracePeriodSeconds: 60
