apiVersion: v1
kind: Service
metadata:
  name: k8s-batch-processor
  namespace: default
  labels:
    app: k8s-batch-processor
spec:
  type: ClusterIP
  selector:
    app: k8s-batch-processor
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
# NodePort for local/dev access
apiVersion: v1
kind: Service
metadata:
  name: k8s-batch-processor-nodeport
  namespace: default
  labels:
    app: k8s-batch-processor
spec:
  type: NodePort
  selector:
    app: k8s-batch-processor
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
