version: '3.9'

services:
  k8s-batch-processor:
    build:
      context: .
      dockerfile: Dockerfile
    image: wallaceespindola/k8s-batch-processor:latest
    container_name: k8s-batch-processor
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx512m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
