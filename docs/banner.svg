<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="podGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#6c63ff;stop-opacity:0.4" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Subtle border -->
  <rect width="900" height="200" fill="none" stroke="#2e3254" stroke-width="1.5" rx="12"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="900" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- Pod blocks (decorative, right side) -->
  <!-- pod-1 -->
  <rect x="630" y="40" width="36" height="120" fill="url(#podGrad)" rx="6" opacity="0.7"/>
  <rect x="630" y="40" width="36" height="90" fill="#6c63ff" rx="6" opacity="0.9"/>

  <!-- pod-2 -->
  <rect x="676" y="40" width="36" height="120" fill="#00d4aa22" rx="6"/>
  <rect x="676" y="40" width="36" height="65" fill="#00d4aa" rx="6" opacity="0.85"/>

  <!-- pod-3 -->
  <rect x="722" y="40" width="36" height="120" fill="#f59e0b22" rx="6"/>
  <rect x="722" y="40" width="36" height="100" fill="#f59e0b" rx="6" opacity="0.85"/>

  <!-- pod-4 -->
  <rect x="768" y="40" width="36" height="120" fill="#ef444422" rx="6"/>
  <rect x="768" y="40" width="36" height="45" fill="#ef4444" rx="6" opacity="0.85"/>

  <!-- Pod labels -->
  <text x="648" y="175" font-family="monospace" font-size="9" fill="#6c63ff" text-anchor="middle">pod-1</text>
  <text x="694" y="175" font-family="monospace" font-size="9" fill="#00d4aa" text-anchor="middle">pod-2</text>
  <text x="740" y="175" font-family="monospace" font-size="9" fill="#f59e0b" text-anchor="middle">pod-3</text>
  <text x="786" y="175" font-family="monospace" font-size="9" fill="#ef4444" text-anchor="middle">pod-4</text>

  <!-- Divider line -->
  <line x1="615" y1="30" x2="615" y2="170" stroke="#2e3254" stroke-width="1"/>

  <!-- Gear icon circle -->
  <circle cx="62" cy="88" r="32" fill="#6c63ff22" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="62" y="96" font-size="26" text-anchor="middle" fill="#6c63ff">⚙</text>

  <!-- Main title -->
  <text x="110" y="75" font-family="'Segoe UI', system-ui, sans-serif" font-size="32" font-weight="700" fill="#e8e9f3">
    K8s Batch
    <tspan fill="url(#accent)"> Processor</tspan>
  </text>

  <!-- Subtitle -->
  <text x="110" y="105" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" fill="#8b8fa8">
    Kubernetes-native · Spring Batch 5 · Parallel Pod Processing · Real-time SSE Dashboard
  </text>

  <!-- Tech pills -->
  <!-- Java 21 -->
  <rect x="110" y="122" width="62" height="22" fill="#6c63ff22" rx="11" stroke="#6c63ff" stroke-width="1"/>
  <text x="141" y="137" font-family="monospace" font-size="10.5" fill="#6c63ff" text-anchor="middle">Java 21</text>

  <!-- Spring Boot -->
  <rect x="180" y="122" width="100" height="22" fill="#00d4aa22" rx="11" stroke="#00d4aa" stroke-width="1"/>
  <text x="230" y="137" font-family="monospace" font-size="10.5" fill="#00d4aa" text-anchor="middle">Spring Boot 3.4</text>

  <!-- Spring Batch -->
  <rect x="288" y="122" width="104" height="22" fill="#f59e0b22" rx="11" stroke="#f59e0b" stroke-width="1"/>
  <text x="340" y="137" font-family="monospace" font-size="10.5" fill="#f59e0b" text-anchor="middle">Spring Batch 5</text>

  <!-- Kubernetes -->
  <rect x="400" y="122" width="90" height="22" fill="#6c63ff22" rx="11" stroke="#6c63ff" stroke-width="1"/>
  <text x="445" y="137" font-family="monospace" font-size="10.5" fill="#6c63ff" text-anchor="middle">Kubernetes</text>

  <!-- H2 -->
  <rect x="498" y="122" width="54" height="22" fill="#00d4aa22" rx="11" stroke="#00d4aa" stroke-width="1"/>
  <text x="525" y="137" font-family="monospace" font-size="10.5" fill="#00d4aa" text-anchor="middle">H2 DB</text>

  <!-- SSE -->
  <rect x="560" y="122" width="42" height="22" fill="#ef444422" rx="11" stroke="#ef4444" stroke-width="1"/>
  <text x="581" y="137" font-family="monospace" font-size="10.5" fill="#ef4444" text-anchor="middle">SSE</text>

  <!-- Author -->
  <text x="110" y="168" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" fill="#4b4f68">
    by Wallace Espindola · github.com/wallaceespindola
  </text>
</svg>
